name: PDF to TEI

on:
  push:
    paths:
      - 'pdfs/**'

jobs:
  convert:
    runs-on: ubuntu-latest

    services:
      grobid:
        image: lfoppiano/grobid:0.8.1
        ports:
          - 8070:8070
        options: >-
          --memory=4g
          --health-cmd "curl -f http://localhost:8070/api/isalive || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=120s

    steps:
      - uses: actions/checkout@v4

      - name: Warte bis GROBID bereit ist
        run: |
          echo "Warte auf GROBID..."
          for i in {1..60}; do
            if curl -sf http://localhost:8070/api/isalive; then
              echo "GROBID läuft!"
              exit 0
            fi
            echo "Versuch $i/60..."
            sleep 10
          done
          echo "GROBID nicht erreichbar"
          exit 1

      - name: PDFs umwandeln
        run: |
          mkdir -p tei-output
          for pdf in pdfs/*.pdf; do
            filename=$(basename "$pdf" .pdf)
            curl -X POST http://localhost:8070/api/processFulltextDocument \
              -F "input=@$pdf" \
              -o "tei-output/$filename.xml"
            echo "Fertig: $filename.xml"
          done

      - name: TEI XMLs hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tei-xmls
          path: tei-output/